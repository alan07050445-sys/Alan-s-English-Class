<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Background -->
  <rect width="512" height="512" fill="#F4F0E7"/>

  <!-- Subtle inner border -->
  <rect x="22" y="22" width="468" height="468" fill="none" stroke="#DDD6C4" stroke-width="2"/>

  <!-- Serif italic A — drawn as paths for precise control -->
  <text
    x="256" y="340"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="320"
    font-style="italic"
    font-weight="400"
    fill="#15130E"
    text-anchor="middle"
    letter-spacing="-8"
  >A</text>

  <!-- Accent dot — bottom right -->
  <circle cx="368" cy="388" r="18" fill="#8B3120"/>
</svg>
